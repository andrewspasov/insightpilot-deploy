services:
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5679:5678"
    environment:
      # Important for correct schedule times
      - GENERIC_TIMEZONE=Europe/Skopje

      # This encrypts saved credentials inside n8n. Keep it stable.
      - N8N_ENCRYPTION_KEY=replace-with-a-long-random-string

      # Optional but recommended: tell n8n its public URL (mainly for webhooks)
      # For local dev you can leave this out.
      # - N8N_PROTOCOL=http
      # - N8N_HOST=localhost
      # - N8N_PORT=5678
      # - WEBHOOK_URL=http://localhost:5679/
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
