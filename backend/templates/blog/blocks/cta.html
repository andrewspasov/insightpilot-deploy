<div class="card" style="text-align:center; background: linear-gradient(135deg, rgba(14,165,233,0.14), rgba(34,211,238,0.08)); border-color: rgba(255,255,255,0.12);">
  <div style="font-weight:800; font-size:1.4rem; margin-bottom:6px;">{{ value.headline }}</div>
  {% if value.text %}<div class="muted" style="margin-bottom:12px;">{{ value.text }}</div>{% endif %}
  <a class="btn" href="{{ value.button_url }}">{{ value.button_label }}</a>
</div>
