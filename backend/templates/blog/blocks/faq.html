{% load wagtailcore_tags %}
<div class="card">
  <div style="display:grid; gap:12px;">
    {% for item in value.items %}
      <div style="padding:14px; border:1px solid rgba(255,255,255,0.08); border-radius:12px; background: rgba(255,255,255,0.02);">
        <div style="font-weight:700; margin-bottom:6px;">{{ item.question }}</div>
        <div class="muted">{{ item.answer|richtext }}</div>
      </div>
    {% endfor %}
  </div>
</div>
