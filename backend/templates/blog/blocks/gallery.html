{% load wagtailimages_tags %}
<div class="card">
  <div style="display:grid; gap:12px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));">
    {% for item in value %}
      {% image item.image fill-600x400 as thumb %}
      <figure style="margin:0;">
        <img src="{{ thumb.url }}" width="{{ thumb.width }}" height="{{ thumb.height }}" alt="{{ item.caption|default:item.image.title }}" style="width:100%; height:auto; border-radius:12px;" />
        {% if item.caption %}<figcaption class="muted" style="margin-top:6px;">{{ item.caption }}</figcaption>{% endif %}
      </figure>
    {% endfor %}
  </div>
</div>
