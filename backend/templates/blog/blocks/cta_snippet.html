{% if value.snippet %}
  <div class="card" style="text-align:center; background: linear-gradient(135deg, rgba(34,197,94,0.14), rgba(34,197,94,0.08)); border-color: rgba(255,255,255,0.12);">
    <div style="font-weight:800; font-size:1.3rem; margin-bottom:6px;">{{ value.snippet.title }}</div>
    {% if value.snippet.text %}<div class="muted" style="margin-bottom:12px;">{{ value.snippet.text }}</div>{% endif %}
    <a class="btn" href="{{ value.snippet.button_url }}">{{ value.snippet.button_label }}</a>
  </div>
{% endif %}
